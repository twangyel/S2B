<!-- ===== PWA SCRIPT SNIPPET (OPTIMIZED) ===== -->
<script>
(function () {
  'use strict';

  window.__pwaStart = Date.now();

  // Prevent duplicate execution
  let splashHidden = false;

  // ==========================================
  // 1. HIDE SPLASH SCREEN
  // ==========================================
  function hideSplash() {
    if (splashHidden) return;
    splashHidden = true;

    const splash = document.getElementById('pwa-splash');

    if (!splash) {
      document.body.classList.add('loaded');
      return;
    }

    const elapsed = Date.now() - window.__pwaStart;
    const minDisplay = 600;
    const delay = Math.max(0, minDisplay - elapsed);

    setTimeout(() => {
      splash.classList.add('vanish');
      document.body.classList.add('loaded');

      // Prevent scroll/white-space issues
      document.body.style.overflow = 'auto';

      setTimeout(() => {
        splash.classList.add('force-gone');

        // Fully remove from DOM
        requestAnimationFrame(() => {
          splash.remove();
        });
      }, 550);
    }, delay);
  }

  if (document.readyState === 'complete') {
    hideSplash();
  } else {
    window.addEventListener('load', hideSplash, { once: true });

    // Emergency fallback
    setTimeout(hideSplash, 4000);
  }

  // ==========================================
  // 2. OFFLINE / ONLINE BANNER
  // ==========================================
  const offlineBanner = document.getElementById('offline-banner');

  function updateOnlineStatus() {
    if (!offlineBanner) return;

    if (navigator.onLine) {
      offlineBanner.classList.add('hidden');
    } else {
      offlineBanner.classList.remove('hidden');
    }
  }

  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);

  updateOnlineStatus();

  // ==========================================
  // 3. SERVICE WORKER
  // ==========================================
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('/service-worker.js');

        console.log('[PWA] SW registered:', reg.scope);

        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;

          if (!newWorker) return;

          newWorker.addEventListener('statechange', () => {
            if (
              newWorker.state === 'installed' &&
              navigator.serviceWorker.controller
            ) {
              console.log('[PWA] New version available');
            }
          });
        });
      } catch (err) {
        console.error('[PWA] SW registration failed:', err);
      }
    });
  }

  // ==========================================
  // 4. CTRL/CMD + K SEARCH
  // ==========================================
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      const searchInput = document.getElementById('track-input');

      if (searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
    }
  });

  // ==========================================
  // 5. MOBILE VIEWPORT FIX
  // ==========================================
  function setAppHeight() {
    document.documentElement.style.setProperty(
      '--app-height',
      `${window.innerHeight}px`
    );
  }

  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  setAppHeight();

})();
</script>
