<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Shop2Bhutan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: white;
      border-radius: 2rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .login-card h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }
    .login-card p {
      color: #475569;
      margin-bottom: 2rem;
    }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 1rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    button {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #2563eb;
    }
    .error {
      color: #dc2626;
      background: #fee2e2;
      padding: 0.75rem;
      border-radius: 0.75rem;
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
    }
    .logo {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🛍️</div>
    <h1>Admin sign in</h1>
    <p>Shop2Bhutan • Order management</p>
    <form id="login-form">
      <input type="email" id="email" placeholder="admin@shop2bhutan.com" required autocomplete="email">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit">Log in</button>
    </form>
    <div id="error-message" class="error" style="display: none;"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://deecrnfbvgbzyybqhywy.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlZWNybmZidmdienl5YnFoeXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzk4MTAsImV4cCI6MjA5NDY1NTgxMH0.zO07GeHD-EW_6589vP07nTP95zFNIhp8YG57I5vWOf8"
    );

    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('error-message');

    // check if already logged in
    const session = localStorage.getItem('sb_admin_session');
    if (session) {
      // verify token still valid? optional, but redirect to admin
      window.location.href = '/admin-reviews.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        errorDiv.textContent = error.message || 'Login failed. Check credentials.';
        errorDiv.style.display = 'block';
        return;
      }

      // store session access token
      localStorage.setItem('sb_admin_session', data.session.access_token);
      window.location.href = '/admin-reviews.html';
    });
  </script>
</body>
</html>
