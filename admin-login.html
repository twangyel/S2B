</div>

<!-- Offline Banner -->

  <svg class="inline-block w-3.5 h-3.5 mr-1 -mt-px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>

  <nav>

  <main class="login-wrapper">
    <div class="login-card">

            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h1>Admin Sign In</h1>
        <p class="subtitle">Shop2Bhutan Order Management</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input 
              type="email" 
              id="email" 
              placeholder="admin@shop2bhutan.com" 
              required 
              autocomplete="email"
              aria-describedby="email-hint"
            >
          </div>
          <span id="email-hint" class="hint-text">Use your admin email address</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input 
              type="password" 
              id="password" 
              placeholder="Enter your password" 
              required 
              autocomplete="current-password"
            >
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="remember">
            <span class="checkmark"></span>
            <span class="checkbox-label">Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn">

<!-- PWA Bootstrap -->
<script>
(function() {
  'use strict';

  // 1. Hide splash screen gracefully
  function hideSplash() {
    const splash = document.getElementById('pwa-splash');
    if (!splash) return;
    // Ensure minimum visible time for perceived performance
    const elapsed = Date.now() - (window.__pwaStart || Date.now());
    const delay = Math.max(0, 800 - elapsed);
    setTimeout(() => {
      splash.classList.add('vanish');
      document.body.classList.add('loaded');
      setTimeout(() => splash.remove(), 650);
    }, delay);
  }

  // Record start time
  window.__pwaStart = Date.now();

  // Hide on load + fallback
  if (document.readyState === 'complete') {
    hideSplash();
  } else {
    window.addEventListener('load', hideSplash);
  }

  // 2. Offline / Online banner
  const offlineBanner = document.getElementById('offline-banner');
  function updateOnlineStatus() {
    if (!offlineBanner) return;
    if (navigator.onLine) {
      offlineBanner.classList.add('hidden');
    } else {
      offlineBanner.classList.remove('hidden');
    }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // 3. Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then((reg) => {
          console.log('[PWA] SW registered:', reg.scope);
          // Optional: prompt update if new SW waiting
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker?.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] New version available. Refresh to update.');
              }
            });
          });
        })
        .catch((err) => console.error('[PWA] SW registration failed:', err));
    });
  }

  // 4. Keyboard shortcut: Ctrl/Cmd + K focuses search (track page)
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      const searchInput = document.getElementById('track-input');
      if (searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
    }
  });
})();
</script>
