<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shop2Bhutan Admin">
  <title>Admin Panel | Shop2Bhutan</title>
  <link rel="stylesheet" href="/css/login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>
<body>
 

  <nav>
    <div class="container nav-content">
      <a href="https://shop2bt.vercel.app/" class="logo">
        <div class="logo-icon">
          <img src="/image/logo.png" alt="Shop2Bhutan Logo" />
        </div>
      </a>
    </div>
  </nav>

  <main class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="avatar-ring">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h1>Admin Sign In</h1>
        <p class="subtitle">Shop2Bhutan Order Management</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input 
              type="email" 
              id="email" 
              placeholder="admin@shop2bhutan.com" 
              required 
              autocomplete="email"
              aria-describedby="email-hint"
            >
          </div>
          <span id="email-hint" class="hint-text">Use your admin email address</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input 
              type="password" 
              id="password" 
              placeholder="Enter your password" 
              required 
              autocomplete="current-password"
            >
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="remember">
            <span class="checkmark"></span>
            <span class="checkbox-label">Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text">Sign In</span>
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/>
            <path d="m12 5 7 7-7 7"/>
          </svg>
          <span class="spinner hidden"></span>
        </button>
      </form>

      <button type="button" id="install-button" class="install-btn hidden" onclick="installApp()">
        📱 Install App
      </button>

      <div id="error-message" class="error-banner hidden" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" x2="12" y1="8" y2="12"/>
          <line x1="12" x2="12.01" y1="16" y2="16"/>
        </svg>
        <span class="error-text"></span>
      </div>
    </div>
  </main>

  <footer class="login-footer">
    <p>© 2026 Shop2Bhutan. All rights reserved.</p>
  </footer>

   <script type="module">
  const offlineBanner = document.getElementById('offline-banner');

  function updateOnlineStatus() {
    if (navigator.onLine) {
      offlineBanner.classList.add('hidden');
    } else {
      offlineBanner.classList.remove('hidden');
    }
  }

  // Wait slightly before checking connection
  window.addEventListener('load', () => {
    setTimeout(updateOnlineStatus, 500);
  });

  window.addEventListener('online', () => {
    offlineBanner.classList.add('hidden');
  });

  window.addEventListener('offline', () => {
    offlineBanner.classList.remove('hidden');
  });
</script>
<script>
    // Install Prompt
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('✅ Before Install Prompt fired!');
      deferredPrompt = e;

      const installBtn = document.getElementById('install-button');
      if (installBtn) installBtn.classList.remove('hidden');
    });

    async function installApp() {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('Install outcome:', outcome);
      deferredPrompt = null;
    }
  </script>
  <script type="module" src="/js/admin_login.js"></script>
 
 <div id="offline-banner" class="hidden" aria-live="polite">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h.01"/>
      <path d="M8.5 16.429a5 5 0 0 1 7 0"/>
      <path d="M5 12.859a10 10 0 0 1 5.17-2.69"/>
      <path d="M19 12.859a10 10 0 0 0-2.007-1.523"/>
      <path d="M2 8.82a15 15 0 0 1 4.177-2.648"/>
      <path d="M22 8.82a15 15 0 0 0-11.288-3.908"/>
      <path d="M2 2l20 20"/>
    </svg>
    You're offline. Showing last updated data.
  </div>
  
</body>
</html>
