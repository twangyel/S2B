<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Order - Shop2Bhutan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/track.css" />
</head>
<body>

  <nav>
    <div class="container nav-content">
      <a href="https://shop2bt.vercel.app/" class="logo">
        <div class="logo-icon"><img src="/image/logo.png" alt="Shop2Bhutan Logo" /></div>
      </a>
      <a href="https://shop2bt.vercel.app/" style="color:var(--muted); text-decoration:none; font-weight:500;">
        ← Back to Home
      </a>
    </div>
  </nav>

  <h2>Order Tracking</h2>
<div id="timeline"></div>

  <div class="container">
    <div class="track-card">
      <div style="text-align:center; margin-bottom:32px;">
        <h2 style="font-size:2.2rem; margin-bottom:12px;">Track Your Order</h2>
        <p style="color:var(--muted);">Enter your Order ID to check real-time status</p>
      </div>

      <div class="input-group">
        <label for="orderId" style="display:block; margin-bottom:8px; font-weight:500;">Order ID</label>
        <input type="text" id="orderId" placeholder="e.g. S2B-250517-042" autocomplete="off" />
      </div>

      <button onclick="searchOrder()" class="btn-primary" id="searchBtn">
        <i class="fa-solid fa-magnifying-glass"></i> Check Status
      </button>

      <div id="result" class="hidden"></div>
    </div>
  </div>

  <!-- //Quotation -->
  <div id="quotation-box" class="hidden">
  <h2>Quotation Details</h2>

  <p>Product Price: <span id="product_price"></span></p>
  <p>Shipping Fee: <span id="shipping_fee"></span></p>
  <p>Service Fee: <span id="service_fee"></span></p>
  <p>Delivery Fee: <span id="delivery_fee"></span></p>

  <hr>

  <h3>Total: ₹<span id="total_amount"></span></h3>

  <button onclick="acceptQuotation()">Accept</button>
  <button onclick="rejectQuotation()">Reject</button>
</div>

  <script type="module" src="/js/track.js"></script>
</body>
</html>
