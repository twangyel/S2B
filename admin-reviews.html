<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop2Bhutan Admin Panel</title>
  <link rel="stylesheet" href="/css/admin_reviews.css">
</head>

<body>

  <!-- HEADER -->
  <div class="topbar">
    <h1>🛠️ Shop2Bhutan Admin Panel</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div id="orders-tab" class="tab active" onclick="switchTab('orders')">
      📦 Orders
    </div>
    <div id="reviews-tab" class="tab" onclick="switchTab('reviews')">
      ⭐ Reviews
    </div>
  </div>

  <!-- ORDERS -->
  <section id="orders-section">

    <div class="search-bar">
      <input
        type="text"
        id="order-search"
        placeholder="Search by Order ID, Name, or City..."
      >
      <!-- FIX #3: Button now calls window.loadOrders correctly -->
      <button onclick="window.loadOrders()">Refresh</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>City</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
            <th>Final Total</th>
            <th>Due Amount</th>
            <th>Advance Paid</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>

  </section>

  <!-- REVIEWS -->
  <section id="reviews-section" style="display:none;">

    <!-- FIX #12: Added search/filter bar for reviews -->
    <div class="search-bar">
      <input
        type="text"
        id="review-search"
        placeholder="Search by name..."
      >
      <select id="review-filter">
        <option value="all">All Reviews</option>
        <option value="approved">Approved</option>
        <option value="pending">Pending Approval</option>
      </select>
      <button onclick="window.loadReviews()">Refresh</button>
    </div>

    <div id="reviews-container"></div>
  </section>

  <script type="module" src="/js/admin_reviews.js"></script>

</body>
</html>
