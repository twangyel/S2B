<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Shop2Bhutan Admin Panel</title>
  <link rel="stylesheet" href="/css/admin_reviews.css">
</head>
<body>

<div class="topbar">
  <h1>🛠️ Shop2Bhutan Admin Suite</h1>
  <button class="logout-btn" id="logout-btn">Logout</button>
</div>

<div class="tabs">
  <div id="orders-tab" class="tab active" data-tab="orders">📦 Orders</div>
  <div id="reviews-tab" class="tab" data-tab="reviews">⭐ Reviews</div>
</div>

<div id="toast" class="toast"></div>

<!-- ORDERS SECTION (refactored columns) -->
<section id="orders-section" class="section">
  <div class="controls-bar">
    <div class="search-group">
      <input type="text" id="order-search" placeholder="🔍 Order ID, Customer, City...">
      <button id="orders-refresh-btn" class="btn">⟳ Refresh</button>
    </div>
    <div class="search-group">
      <select id="orders-page-size">
        <option value="10">10 per page</option>
        <option value="25" selected>25 per page</option>
        <option value="50">50 per page</option>
        <option value="100">100 per page</option>
      </select>
      <button id="export-orders-btn" class="btn btn-primary">📎 Export Orders (CSV)</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Order ID</th><th>Order Date</th><th>Customer Name</th><th>City</th>
          <th>Delivery Address</th><th>Order Status</th><th>Total Amount (₹)</th>
          <th>Advance Payment (₹)</th><th>Due (₹)</th><th>Remark</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="orders-body"><tr><td colspan="11" style="text-align:center">Loading orders...</td></tr></tbody>
    </table>
  </div>
  <div id="orders-pagination" class="pagination"></div>
</section>

<!-- REVIEWS SECTION -->
<section id="reviews-section" class="section" style="display:none;">
  <div class="controls-bar">
    <div class="search-group">
      <input type="text" id="review-search" placeholder="Search by name...">
      <select id="review-filter">
        <option value="all">All Reviews</option>
        <option value="approved">Approved</option>
        <option value="pending">Pending Approval</option>
      </select>
      <button id="reviews-refresh-btn" class="btn">⟳ Refresh</button>
    </div>
    <div class="search-group">
      <select id="reviews-page-size">
        <option value="6">6 per page</option>
        <option value="12" selected>12 per page</option>
        <option value="24">24 per page</option>
      </select>
      <button id="export-reviews-btn" class="btn btn-primary">📎 Export Reviews (CSV)</button>
    </div>
  </div>
  <div id="reviews-container" class="reviews-grid"></div>
  <div id="reviews-pagination" class="pagination"></div>
</section>

<script type="module" src="/js/admin_reviews.js"></script>
</body>
</html>
