<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop2Bhutan Admin Panel</title>

  <link rel="stylesheet" href="/css/admin_reviews.css">
</head>

<body>

  <!-- HEADER -->
  <div class="topbar">
    <h1>🛠️ Shop2Bhutan Admin Panel</h1>

    <button class="logout-btn" onclick="logout()">
      Logout
    </button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div id="orders-tab"
         class="tab active"
         onclick="switchTab('orders')">
      📦 Orders
    </div>

    <div id="reviews-tab"
         class="tab"
         onclick="switchTab('reviews')">
      ⭐ Reviews
    </div>
  </div>

  <!-- ORDERS -->
  <section id="orders-section">

   <!-- SEARCH BAR -->
<div class="search-bar">

  <input
    type="text"
    id="order-search"
    placeholder="Search Order ID..."
  >

  <button onclick="loadOrders()">
    Refresh
  </button>

</div>

    <div class="table-wrapper">
      <table>

        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>City</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
            <th>Final Total</th>
            <th>Due Amount</th>
          </tr>
        </thead>

        <tbody id="orders-body"></tbody>

      </table>
    </div>

  </section>

  <!-- REVIEWS -->
  <section id="reviews-section" style="display:none;">
    <div id="reviews-container"></div>
  </section>

  <!-- JS -->
  <script type="module" src="/js/admin_reviews.js"></script>

</body>
</html>
